<!DOCTYPE html>
<html>
<head>
    <title>AI Mentor Chat</title>
</head>
<body>

<h1>AI Career Mentor</h1>

<form method="POST">

    <textarea
        name="message"
        rows="6"
        cols="60"
        placeholder="Ask career questions..."
    ></textarea>

    <br><br>

    <button type="submit">
        Ask AI
    </button>

</form>

<hr>

<h3>Response:</h3>

<p>{{ response }}</p>

</body>
</html>
