{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card">
      <div class="card-body">
        <h3 class="card-title mb-4">Upload Resume (PDF)</h3>
        <form method="post" enctype="multipart/form-data">
          <div class="mb-3">
            <input class="form-control" type="file" name="file" accept="application/pdf" required>
          </div>
          <button class="btn btn-primary">Upload and Analyze</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
